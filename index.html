<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skrin Kunci Penuh & Terkunci</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { overflow: hidden; background: #000; }

        /* Skrin kunci tutup sepenuhnya */
        #skrinKunci {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        #skrinKunci h2 { font-size: 28px; margin-bottom: 12px; }
        #skrinKunci p { color: #aaa; margin-bottom: 30px; font-size: 16px; }

        #paparan {
            width: 240px;
            height: 50px;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            letter-spacing: 8px;
            margin-bottom: 25px;
            color: #fff;
        }

        /* Papan nombor */
        .papan {
            display: grid;
            grid-template-columns: repeat(3, 75px);
            gap: 12px;
            margin-bottom: 20px;
        }

        .nombor {
            width: 75px;
            height: 75px;
            font-size: 26px;
            border: none;
            border-radius: 50%;
            background: #222;
            color: #fff;
            cursor: pointer;
        }

        .nombor:hover { background: #333; }

        #pesanRalat { color: #ff4444; height: 22px; }

        /* Kandungan selepas buka */
        #kandungan {
            width: 100vw;
            height: 100vh;
            background: #f8f8f8;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            padding: 20px;
        }

        #btnKeluar {
            padding: 14px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background: #dc2626;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Skrin Kunci -->
    <div id="skrinKunci">
        <h2>Kunci Telefon</h2>
        <p>Masukkan 6 digit kata laluan</p>
        <div id="paparan">******</div>

        <div class="papan">
            <button class="nombor" onclick="tambahNombor('1')">1</button>
            <button class="nombor" onclick="tambahNombor('2')">2</button>
            <button class="nombor" onclick="tambahNombor('3')">3</button>
            <button class="nombor" onclick="tambahNombor('4')">4</button>
            <button class="nombor" onclick="tambahNombor('5')">5</button>
            <button class="nombor" onclick="tambahNombor('6')">6</button>
            <button class="nombor" onclick="tambahNombor('7')">7</button>
            <button class="nombor" onclick="tambahNombor('8')">8</button>
            <button class="nombor" onclick="tambahNombor('9')">9</button>
            <button class="nombor" onclick="padamSatu()">⌫</button>
            <button class="nombor" onclick="tambahNombor('0')">0</button>
            <button class="nombor" onclick="bukaKunci()">✓</button>
        </div>

        <div id="pesanRalat"></div>
    </div>

    <!-- Kandungan Utama -->
    <div id="kandungan">
        <h1>Telefon Dibuka ✅</h1>
        <p>Kini boleh guna dan keluar bila-bila masa</p>
        <button id="btnKeluar" onclick="kunciSemula()">🔒 Kunci Semula / Keluar</button>
    </div>

    <script>
        const kataBetul = "7555"; // Tukar nombor ikut suka
        let inputPengguna = "";

        // Halang keluar atau tutup tab secara paksa
        window.onbeforeunload = function(e) {
            if (document.getElementById("skrinKunci").style.display !== "none") {
                e.preventDefault();
                e.returnValue = "Anda mesti masuk kata laluan terlebih dahulu!";
                return e.returnValue;
            }
        };

        // Halang butang belakang pelayar
        history.pushState(null, null, location.href);
        window.onpopstate = function() {
            history.go(1);
        };

        function tambahNombor(nom) {
            if (inputPengguna.length < 6) {
                inputPengguna += nom;
                kemasPaparan();
            }
        }

        function padamSatu() {
            inputPengguna = inputPengguna.slice(0, -1);
            kemasPaparan();
        }

        function kemasPaparan() {
            let tampil = "";
            for (let i = 0; i < inputPengguna.length; i++) tampil += "•";
            document.getElementById("paparan").textContent = tampil;
        }

        function bukaKunci() {
            const pesan = document.getElementById("pesanRalat");
            if (inputPengguna === kataBetul) {
                document.getElementById("skrinKunci").style.display = "none";
                document.getElementById("kandungan").style.display = "flex";
                pesan.textContent = "";
            } else {
                pesan.textContent = "Kata laluan salah";
                inputPengguna = "";
                kemasPaparan();
            }
        }

        function kunciSemula() {
            document.getElementById("kandungan").style.display = "none";
            document.getElementById("skrinKunci").style.display = "flex";
            inputPengguna = "";
            kemasPaparan();
        }
    </script>

</body>
</html>
